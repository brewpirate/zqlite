name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel previous runs of the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Format · Lint · Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # argusFoundry is a git submodule (separate private repo) that the
        # default GITHUB_TOKEN can't access, so CI checks it out without
        # submodules. It is a local dev/tooling-only dependency: nothing in
        # `src/`, the configs, or the published `dist/` references it (runtime
        # imports are relative modules + `zod` only), so both CI and installed
        # consumers are unaffected by its absence.

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format

      - name: Lint
        run: bun run lint

      # The integration tests import the package by name ('zqlite'), which
      # resolves through the exports map to ./dist. dist is gitignored, so a
      # fresh CI checkout has none — build before the typecheck or `bun run
      # check` fails on those files with "Cannot find module 'zqlite'".
      - name: Build
        run: bun run build

      - name: Type check
        run: bun run check


  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The root `bunfig.toml` preloads `@flaky-tests/plugin-bun/preload`
      # for local decay-telemetry, but that package is under active
      # local development (not published to any registry yet) and is
      # resolved via Bun's global store on developer machines. CI has
      # no way to resolve it, so swap in a CI-specific bunfig that
      # drops only that preload entry. See `.github/bunfig.ci.toml`
      # header for the full rationale and the deletion condition.
      # - name: Use CI bunfig (drops @flaky-tests preload)
      #   run: cp .github/bunfig.ci.toml bunfig.toml

      # Bun sometimes segfaults during test-process shutdown *after* a
      # successful run (worker-thread cleanup race). A non-zero exit is
      # tolerated ONLY when the test summary printed cleanly — i.e. the run
      # reached the end and reported zero failures. A non-zero exit with no
      # clean summary (a crash mid-run, before the summary) is a real failure
      # and fails the job: that is exactly how a crash-inducing bug in the code
      # under test presents, and it must not pass. (An earlier version also
      # tolerated a crash with no summary as long as no `(fail)` marker had
      # printed — that let a genuine mid-run crash go green, so it was removed.)
      - name: Run tests
        run: |
          set +e
          bun run test 2>&1 | tee test-output.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          # A clean summary means the run reached the end: a "0 fail" line is
          # present and no "N fail"/"N errors" line with N >= 1 is.
          HAS_CLEAN_SUMMARY=0
          if grep -qE '^ +0 fail' test-output.log && ! grep -qE '^ +[1-9][0-9]* (fail|errors?)' test-output.log; then
            HAS_CLEAN_SUMMARY=1
          fi

          if [[ $TEST_EXIT -eq 0 ]]; then
            echo "::notice::Tests passed cleanly."
          elif [[ $HAS_CLEAN_SUMMARY -eq 1 ]]; then
            echo "::warning::Bun exited non-zero ($TEST_EXIT) but the summary reported 0 failures (shutdown segfault after a clean run); ignoring."
          else
            echo "::error::Tests failed with exit $TEST_EXIT and no clean summary (treated as a real failure — possible mid-run crash)."
            exit $TEST_EXIT
          fi

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-output
          path: test-output.log
          retention-days: 7
